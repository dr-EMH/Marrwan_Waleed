<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Me | Marrwan Waleed</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { background-color: #030712; color: #f9fafb; font-family: 'Inter', sans-serif; }
        .glass-card { background: rgba(17, 24, 39, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.08); }
        .accent-text { color: #4FD1C5; }
        .contact-link { transition: all 0.3s ease; }
        .contact-link:hover { background: rgba(79, 209, 197, 0.1); border-color: rgba(79, 209, 197, 0.3); transform: translateX(5px); }
    </style>
</head>
<body class="p-4 md:p-8 min-h-screen flex flex-col">
    <nav class="max-w-5xl w-full mx-auto mb-10 glass-card p-4 rounded-2xl flex justify-between items-center px-6 md:px-10">
        <div class="accent-text font-bold text-xl tracking-tighter">MARRWAN.DEV</div>
        
        <div class="flex gap-6 text-sm font-bold">
            <a href="index.html" class="hover:text-[#4FD1C5] transition">About</a>
            <a href="certificates.html" class="hover:text-[#4FD1C5] transition">Certificates</a>
            <a href="contact.html" class="accent-text">Contact</a>
        </div>

        <div class="flex gap-4 border-l border-white/10 pl-4 ml-2">
            <a href="https://github.com/marrwan-waleed" target="_blank" class="hover:text-[#4FD1C5] transition">
                <i data-lucide="github" class="w-5 h-5"></i>
            </a>
            <a href="https://www.linkedin.com/in/marrwan-waleed-2b3691361" target="_blank" class="hover:text-[#4FD1C5] transition">
                <i data-lucide="linkedin" class="w-5 h-5"></i>
            </a>
        </div>
    </nav>

    <main class="max-w-xl w-full mx-auto my-auto">
        <div class="glass-card p-10 rounded-3xl text-center">
            <div class="inline-flex p-3 rounded-full bg-[#4FD1C5]/10 mb-6">
                <i data-lucide="send" class="accent-text w-8 h-8"></i>
            </div>
            <h2 class="text-3xl font-bold mb-2">Let's Connect!</h2>
            <p class="text-gray-400 mb-10">Feel free to reach out for collaborations or just a friendly hello.</p>
            
            <div class="space-y-4">
                <a href="mailto:marrwan.waleed2011@gmail.com" class="contact-link flex items-center justify-between p-5 rounded-2xl bg-white/5 border border-white/10 group">
                    <div class="flex items-center gap-4">
                        <i data-lucide="mail" class="accent-text w-5 h-5"></i>
                        <span class="text-sm font-medium">Email Me</span>
                    </div>
                    <span class="text-[11px] text-gray-500 mr-2">marrwan.waleed2011@gmail.com</span>
                    <i data-lucide="arrow-right" class="w-4 h-4 opacity-0 group-hover:opacity-100 transition"></i>
                </a>

                <a href="https://www.linkedin.com/in/marrwan-waleed-2b3691361" target="_blank" class="contact-link flex items-center justify-between p-5 rounded-2xl bg-white/5 border border-white/10 group">
                    <div class="flex items-center gap-4">
                        <i data-lucide="linkedin" class="accent-text w-5 h-5"></i>
                        <span class="text-sm font-medium">LinkedIn Profile</span>
                    </div>
                    <i data-lucide="arrow-right" class="w-4 h-4 opacity-0 group-hover:opacity-100 transition"></i>
                </a>
            </div>
        </div>
    </main>

    <footer class="mt-auto py-8 text-center">
        <p class="text-gray-600 text-[10px] uppercase tracking-[0.2em]">Ready to build the future</p>
    </footer>

    <script>
        lucide.createIcons();
    </script>

</html>
